name: Deploy backend to ECS
description: >
  Build & push a backend image to ECR (with layer caching) and roll out the ECS
  service in one region by re-registering its task definition with the new image
  and database wiring. AWS credentials must be configured by the caller beforehand.

inputs:
  aws-region:
    description: Target AWS region (e.g. us-east-1).
    required: true
  ecr-repository:
    description: ECR repository name for the image.
    required: true
  container-name:
    description: Container name inside the task definition to update.
    required: true
  cluster-name:
    description: ECS cluster name.
    required: true
  service-name:
    description: ECS service name.
    required: true
  dockerfile:
    description: Path to the Dockerfile (relative to the workspace root).
    required: true
  build-context:
    description: Docker build context (relative to the workspace root).
    required: true
  image-tag:
    description: Immutable image tag (typically the commit SHA).
    required: true
  db-host:
    description: Database cluster endpoint for the target region.
    required: true
  db-secret-arn:
    description: Secrets Manager ARN holding the DB master credentials.
    required: true
  db-name:
    description: Database name.
    required: true
  db-user:
    description: Database user.
    required: true
  db-port:
    description: Database port.
    required: true

runs:
  using: composite
  steps:
    - name: Login to Amazon ECR
      id: ecr
      uses: aws-actions/amazon-ecr-login@v2
    - name: Ensure ECR repository exists
      shell: bash
      run: |
        aws ecr describe-repositories --repository-names "${{ inputs.ecr-repository }}" --region "${{ inputs.aws-region }}" >/dev/null 2>&1 || \
        aws ecr create-repository --repository-name "${{ inputs.ecr-repository }}" --image-scanning-configuration scanOnPush=true --region "${{ inputs.aws-region }}"
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.build-context }}
        file: ${{ inputs.dockerfile }}
        push: true
        tags: |
          ${{ steps.ecr.outputs.registry }}/${{ inputs.ecr-repository }}:${{ inputs.image-tag }}
          ${{ steps.ecr.outputs.registry }}/${{ inputs.ecr-repository }}:latest
        cache-from: type=gha,scope=${{ inputs.ecr-repository }}
        cache-to: type=gha,mode=max,scope=${{ inputs.ecr-repository }}
    - name: Resolve current task definition ARN
      id: taskdef
      shell: bash
      run: |
        TASK_DEF_ARN="$(aws ecs describe-services \
          --cluster "${{ inputs.cluster-name }}" \
          --services "${{ inputs.service-name }}" \
          --region "${{ inputs.aws-region }}" \
          --query 'services[0].taskDefinition' --output text)"
        if [ -z "${TASK_DEF_ARN}" ] || [ "${TASK_DEF_ARN}" = "None" ]; then
          echo "Could not resolve task definition ARN for service ${{ inputs.service-name }}." >&2
          exit 1
        fi
        echo "arn=${TASK_DEF_ARN}" >> "$GITHUB_OUTPUT"
    - name: Render task definition with new image and DB wiring
      id: render
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition-arn: ${{ steps.taskdef.outputs.arn }}
        container-name: ${{ inputs.container-name }}
        image: ${{ steps.ecr.outputs.registry }}/${{ inputs.ecr-repository }}:${{ inputs.image-tag }}
        environment-variables: |
          DB_HOST=${{ inputs.db-host }}
          DB_NAME=${{ inputs.db-name }}
          DB_USER=${{ inputs.db-user }}
          DB_PORT=${{ inputs.db-port }}
          DB_ENGINE=aurora-postgresql
        secrets: |
          DB_MASTER_SECRET_ARN=${{ inputs.db-secret-arn }}
    - name: Deploy task definition to ECS service
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.render.outputs.task-definition }}
        cluster: ${{ inputs.cluster-name }}
        service: ${{ inputs.service-name }}
        force-new-deployment: true

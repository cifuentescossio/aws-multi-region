name: legacy-api-cicd

on:
  workflow_dispatch:
  pull_request:
    paths:
      - legacy-api/**
      - .github/workflows/legacy-api-cicd.yml
      - .github/actions/deploy-ecs/action.yml
  push:
    branches:
      - main
    paths:
      - legacy-api/**
      - .github/workflows/legacy-api-cicd.yml
      - .github/actions/deploy-ecs/action.yml

permissions:
  contents: read
  id-token: write

env:
  ECR_REPOSITORY: ${{ vars.LEGACY_API_ECR_REPOSITORY || 'legacy-api' }}
  CONTAINER_NAME: ${{ vars.LEGACY_API_CONTAINER_NAME || 'legacy-api' }}
  DB_NAME: ${{ vars.DB_NAME || 'aws-multi-region_app' }}
  DB_USER: ${{ vars.DB_USER || 'dbadmin' }}
  DB_PORT: ${{ vars.DB_PORT || '5432' }}

jobs:
  checks:
    name: legacy-api checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: legacy-api-checks-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v5
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Test
        working-directory: legacy-api
        run: mvn -B -ntp test
      - name: Lint (if configured)
        working-directory: legacy-api
        run: |
          if grep -q "checkstyle-maven-plugin" pom.xml; then
            mvn -B -ntp checkstyle:check
          else
            echo "No Java linter configured. Skipping lint step."
          fi

  deploy:
    name: Deploy legacy-api to ECS
    # push only fires on main (see on.push.branches); workflow_dispatch defaults to
    # the main ref too, so a manual run deploys main.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: legacy-api-deploy-${{ matrix.region_key }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - region_key: virginia
            aws_region: us-east-1
            cluster: ${{ vars.ECS_CLUSTER_VIRGINIA }}
            service: ${{ vars.LEGACY_API_SERVICE_VIRGINIA }}
            db_host: ${{ vars.DB_CLUSTER_ENDPOINT_VIRGINIA }}
            db_secret_arn: ${{ vars.DB_MASTER_SECRET_ARN_VIRGINIA }}
          - region_key: oregon
            aws_region: us-west-2
            cluster: ${{ vars.ECS_CLUSTER_OREGON }}
            service: ${{ vars.LEGACY_API_SERVICE_OREGON }}
            db_host: ${{ vars.DB_CLUSTER_ENDPOINT_OREGON }}
            db_secret_arn: ${{ vars.DB_MASTER_SECRET_ARN_OREGON }}
    steps:
      - uses: actions/checkout@v5
      - name: Validate deploy target
        env:
          CLUSTER: ${{ matrix.cluster }}
          SERVICE: ${{ matrix.service }}
          DB_HOST: ${{ matrix.db_host }}
          DB_SECRET_ARN: ${{ matrix.db_secret_arn }}
        run: |
          : "${CLUSTER:?Missing ECS_CLUSTER_* var for ${{ matrix.region_key }}}"
          : "${SERVICE:?Missing LEGACY_API_SERVICE_* var for ${{ matrix.region_key }}}"
          : "${DB_HOST:?Missing DB_CLUSTER_ENDPOINT_* var for ${{ matrix.region_key }}}"
          : "${DB_SECRET_ARN:?Missing DB_MASTER_SECRET_ARN_* var for ${{ matrix.region_key }}}"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ matrix.aws_region }}
      - name: Build, push and deploy
        uses: ./.github/actions/deploy-ecs
        with:
          aws-region: ${{ matrix.aws_region }}
          ecr-repository: ${{ env.ECR_REPOSITORY }}
          container-name: ${{ env.CONTAINER_NAME }}
          cluster-name: ${{ matrix.cluster }}
          service-name: ${{ matrix.service }}
          dockerfile: legacy-api/Dockerfile
          build-context: legacy-api
          image-tag: ${{ github.sha }}
          db-host: ${{ matrix.db_host }}
          db-secret-arn: ${{ matrix.db_secret_arn }}
          db-name: ${{ env.DB_NAME }}
          db-user: ${{ env.DB_USER }}
          db-port: ${{ env.DB_PORT }}
